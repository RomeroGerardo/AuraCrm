name: CI — Typecheck & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Validate (typecheck + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc -b)
        run: npm run typecheck

      - name: Build for production
        run: npm run build
        env:
          # Variables de entorno para que Vite no falle al hacer el build.
          # Los valores reales se configuran en Vercel; aquí sólo necesitamos
          # que el proceso de build termine sin errores de compilación.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
